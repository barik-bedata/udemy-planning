
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent}
.wrap{display:flex;flex-direction:column;gap:16px;padding:1rem 0}
.screen{position:relative;width:100%;height:300px;background:#121212;border-radius:12px;overflow:hidden;border:1px solid #222}
.scene{position:absolute;inset:0}
canvas{position:absolute;inset:0;width:100%;height:100%}
.fresh{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0}
.code-wrap{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;padding:18px 26px;font-family:monospace;font-size:14px;line-height:1.8;text-align:left}
.duster{position:absolute;top:0;height:100%;left:-102%;width:102%;z-index:10;background:#2C2C2C}
.status{position:absolute;bottom:10px;left:16px;font-size:11px;color:#444;font-family:monospace;z-index:20}
.controls{display:flex;flex-direction:column;gap:12px}
.row{display:flex;align-items:center;gap:10px;justify-content:center;flex-wrap:wrap}
.row label{font-size:13px;color:var(--color-text-secondary);min-width:48px;text-align:right}
input[type=range]{width:140px}
.val{font-size:13px;font-weight:500;min-width:42px;color:var(--color-text-primary)}
.chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;cursor:pointer;border:2px solid transparent;font-family:monospace;transition:border-color 0.15s}
.chip.on{border-color:#fff}
</style>

<div class="wrap">
<div class="screen" id="screen">
  <div class="scene" id="sa">
    <canvas id="cv"></canvas>
  </div>
  <div class="fresh" id="sb">
    <div class="code-wrap">
      <span style="color:#cba6f7">def</span> <span style="color:#a6e3a1">solve</span>(n):<br>
      &nbsp;&nbsp;dp = [<span style="color:#fab387">0</span>] * (n+<span style="color:#fab387">1</span>)<br>
      &nbsp;&nbsp;<span style="color:#f38ba8">for</span> i <span style="color:#cba6f7">in</span> range(<span style="color:#fab387">1</span>, n+<span style="color:#fab387">1</span>):<br>
      &nbsp;&nbsp;&nbsp;&nbsp;dp[i] = dp[i-<span style="color:#fab387">1</span>] + i<br>
      &nbsp;&nbsp;<span style="color:#f38ba8">return</span> dp[n]
    </div>
  </div>
  <div class="duster" id="duster"></div>
  <div class="status" id="status">scene a — graph + dp dry run</div>
</div>

<div class="chips" id="chips">
  <div class="chip on" data-c="#2C2C2C" style="background:#2C2C2C;color:#aaa">Dark Gray</div>
  <div class="chip" data-c="#0D0D0D" style="background:#0D0D0D;color:#555;border-color:#333">Pure Black</div>
  <div class="chip" data-c="#0a1628" style="background:#0a1628;color:#3a5a88">Deep Navy</div>
  <div class="chip" data-c="#1a0a0a" style="background:#1a0a0a;color:#662222">Dark Red</div>
  <div class="chip" data-c="#0a1a0a" style="background:#0a1a0a;color:#226622">Dark Green</div>
</div>

<div class="controls">
  <div class="row">
    <label>Speed</label>
    <input type="range" min="0.3" max="3" step="0.1" value="1" id="spd">
    <span class="val" id="sv">1.0×</span>
  </div>
  <div class="row">
    <button id="pb">▶ Play</button>
    <button id="rb">↺ Reset</button>
  </div>
</div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const sa = document.getElementById('sa');
const sb = document.getElementById('sb');
const duster = document.getElementById('duster');
const status = document.getElementById('status');
const pb = document.getElementById('pb');
const rb = document.getElementById('rb');
const spdEl = document.getElementById('spd');
const svEl = document.getElementById('sv');

let dustColor = '#2C2C2C';
let running = false;
let animId = null;

function resize(){
  const r = cv.parentElement.getBoundingClientRect();
  cv.width = r.width; cv.height = r.height;
  drawChaos();
}

function drawChaos(){
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);

  const nodes = [
    {x:0.12,y:0.22,label:'A',col:'#1a3a5c',tc:'#6ab0f5'},
    {x:0.28,y:0.18,label:'B',col:'#1a3a5c',tc:'#6ab0f5'},
    {x:0.46,y:0.24,label:'C',col:'#1a3a5c',tc:'#6ab0f5'},
    {x:0.62,y:0.16,label:'D',col:'#1a3a5c',tc:'#6ab0f5'},
    {x:0.78,y:0.22,label:'E',col:'#3a1a1a',tc:'#f58080'},
    {x:0.20,y:0.50,label:'F',col:'#3a1a1a',tc:'#f58080'},
    {x:0.38,y:0.52,label:'G',col:'#3a1a1a',tc:'#f58080'},
    {x:0.56,y:0.48,label:'H',col:'#1a3a1a',tc:'#80f580'},
    {x:0.72,y:0.54,label:'I',col:'#1a3a1a',tc:'#80f580'},
    {x:0.88,y:0.46,label:'J',col:'#1a3a5c',tc:'#6ab0f5'},
  ];
  const edges = [
    [0,1,'4'],[1,2,'7'],[2,3,'2'],[3,4,'5'],[0,5,'3'],
    [1,6,'6'],[2,7,'1'],[5,6,'8'],[6,7,'4'],[7,8,'9'],
    [3,7,'3'],[4,9,'2'],[8,9,'6'],[1,5,'5'],[4,8,'7']
  ];

  ctx.font = `11px monospace`;
  edges.forEach(([a,b,w])=>{
    const ax=nodes[a].x*W, ay=nodes[a].y*H;
    const bx=nodes[b].x*W, by=nodes[b].y*H;
    ctx.strokeStyle='#3a3a3a'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
    const mx=(ax+bx)/2, my=(ay+by)/2;
    ctx.fillStyle='#666';
    ctx.fillText('w='+w, mx+3, my-4);
    const angle=Math.atan2(by-ay,bx-ax);
    const al=14, aa=0.4;
    ctx.fillStyle='#3a3a3a';
    ctx.beginPath();
    ctx.moveTo(bx,by);
    ctx.lineTo(bx-al*Math.cos(angle-aa),by-al*Math.sin(angle-aa));
    ctx.lineTo(bx-al*Math.cos(angle+aa),by-al*Math.sin(angle+aa));
    ctx.closePath(); ctx.fill();
  });

  nodes.forEach(n=>{
    const x=n.x*W, y=n.y*H, r=18;
    ctx.fillStyle=n.col;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#444'; ctx.lineWidth=1;
    ctx.stroke();
    ctx.fillStyle=n.tc;
    ctx.font='bold 13px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(n.label,x,y);
  });

  const tdx=W*0.04, tdy=H*0.62;
  const cols=['','0','1','2','3','4','5','6'];
  const rows=[
    ['i=0','0','0','0','0','0','0','0'],
    ['i=1','0','1','2','3','4','5','6'],
    ['i=2','0','1','2','4','5','7','8'],
    ['i=3','0','1','2','4','5','7','10'],
  ];
  const cw=28,rh=20;
  ctx.font='10px monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  [[3,3],[3,4],[3,5],[2,4]].forEach(([r,c])=>{
    ctx.fillStyle='#2a2200';
    ctx.fillRect(tdx+c*cw,tdy+r*rh,cw,rh);
  });
  cols.forEach((c,ci)=>{
    ctx.fillStyle='#555';
    ctx.fillText(c,tdx+ci*cw+cw/2,tdy+rh/2);
  });
  rows.forEach((row,ri)=>{
    row.forEach((cell,ci)=>{
      ctx.strokeStyle='#333'; ctx.lineWidth=0.5;
      ctx.strokeRect(tdx+ci*cw,tdy+(ri+1)*rh,cw,rh);
      const isHl=(ri===2&&ci===3)||(ri===2&&ci===4)||(ri===3&&ci===5)||(ri===1&&ci===2);
      ctx.fillStyle=isHl?'#FFD700':'#666';
      ctx.fillText(cell,tdx+ci*cw+cw/2,tdy+(ri+1)*rh+rh/2);
    });
  });

  ctx.font='10px monospace'; ctx.textAlign='left'; ctx.fillStyle='#444';
  ['dist[A]=0','dist[B]=4','dist[C]=11','dist[D]=13','visited: A,B,C','queue: [D,E,F]'].forEach((t,i)=>{
    ctx.fillText(t, W*0.78, H*0.36+i*14);
  });
}

window.addEventListener('resize', resize);
resize();

document.getElementById('chips').addEventListener('click', e=>{
  const ch=e.target.closest('.chip'); if(!ch) return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  ch.classList.add('on');
  dustColor=ch.dataset.c;
  duster.style.background=dustColor;
});

spdEl.addEventListener('input',()=>{
  svEl.textContent=parseFloat(spdEl.value).toFixed(1)+'×';
});

function resetAll(){
  duster.style.transition='none';
  duster.style.left='-102%';
  duster.style.background=dustColor;
  sa.style.opacity='1';
  sb.style.opacity='0';
  status.textContent='scene a — graph + dp dry run';
  running=false; pb.disabled=false;
}

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function play(){
  if(running) return;
  running=true; pb.disabled=true;
  const spd=parseFloat(spdEl.value);
  const t=ms=>Math.round(ms/spd);

  duster.style.background=dustColor;
  duster.style.transition='none';
  duster.style.left='-102%';
  status.textContent='wiping…';
  await sleep(40);

  duster.style.transition=`left ${t(520)}ms cubic-bezier(0.55,0,0.1,1)`;
  duster.style.left='0%';

  await sleep(t(300));
  sa.style.opacity='0';
  sb.style.opacity='1';
  status.textContent='scene b — clean slate';

  await sleep(t(260));

  duster.style.transition=`left ${t(480)}ms cubic-bezier(0.55,0,0.1,1)`;
  duster.style.left='100%';

  await sleep(t(500));
  running=false; pb.disabled=false;
}

pb.addEventListener('click',play);
rb.addEventListener('click',resetAll);
</script>
